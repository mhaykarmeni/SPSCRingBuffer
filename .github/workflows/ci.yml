name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.build_type }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: build-${{ matrix.build_type }}/_deps
          key: deps-${{ matrix.build_type }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: |
          cmake -S . -B build-${{ matrix.build_type }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build-${{ matrix.build_type }} -j$(nproc)

      - name: Test
        run: ctest --test-dir build-${{ matrix.build_type }} --output-on-failure

  tsan:
    name: TSan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake deps
        uses: actions/cache@v4
        with:
          path: build-tsan/_deps
          key: deps-tsan-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: |
          cmake -S . -B build-tsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

      - name: Build
        run: cmake --build build-tsan --target spsc_tests -j$(nproc)

      - name: Test
        run: ctest --test-dir build-tsan --output-on-failure
